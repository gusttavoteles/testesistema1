<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Tela de Login</title>
</head>
<body>
    <script src="../login.js"></script>
    <div class="login-container">
        <img src="../Imagens/Logo 3d com fundo.png" alt="logo" class="logo">
        <h1>Bem-vindo a Karbo!</h1>
        <p>Controle total do seu restaurante na palma da mão!</p>        
    
        <form onsubmit="return validarLogin()">
            <input type="email" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Acessar o sistema</button>
            <button type="reset">Limpar</button>        
        </form>
        <a href="../html/forgot.html" class="forgot">Esqueci minha senha</a>
        <p class="versao">Versão 1.0.0</p>
    </div>
    
</body>
</html>
